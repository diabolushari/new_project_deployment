- hosts: laravel
  become: yes
  vars_files:
    - vars.yml

  tasks:

  - name: Update server packages
    apt:
      update_cache: yes
      upgrade: dist

  - name: Install base packages
    apt:
      name:
        - git
        - curl
        - unzip
        - nginx
        - mysql-server
        - redis-server
        - software-properties-common
        - gnupg
        - build-essential
        - zip
        - python3-pymysql
      state: present

  - name: Install NodeJS 22
    shell: |
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt install -y nodejs
    args:
      executable: /bin/bash
      creates: /usr/bin/node

  - name: Add PHP repository
    apt_repository:
      repo: ppa:ondrej/php
      state: present
      filename: ondrej-php  

  - name: Install PHP and extensions
    apt:
      name:
        - php{{ php_version }}
        - php{{ php_version }}-fpm
        - php{{ php_version }}-mysql
        - php{{ php_version }}-redis
        - php{{ php_version }}-mbstring
        - php{{ php_version }}-xml
        - php{{ php_version }}-curl
        - php{{ php_version }}-zip
        - php{{ php_version }}-gd
        - php{{ php_version }}-intl
        - php{{ php_version }}-sqlite3
        - php{{ php_version }}-pgsql
        - composer
      state: present

  - name: Set MySQL root password
    shell: |
      mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ db_password }}';" || true
    args:
      executable: /bin/bash

  - name: Create database
    shell: |
      mysql -u root -p'{{ db_password }}' -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
    args:
      executable: /bin/bash

  - name: Import SQL backup
    shell: |
      mysql -u root -p'{{ db_password }}' {{ db_name }} < {{ backup_sql_path }}
    args:
      executable: /bin/bash
    when: backup_sql_path is defined

  - name: Clone Laravel project
    git:
      repo: git@github.com:swaraj-xocortx/spontaine-demo.git
      dest: /var/www/html/spontaine-demo
      version: main
    become: false

  - name: Remove existing storage directory
    file:
      path: "{{ app_path }}/storage"
      state: absent

  - name: Copy storage directory from backup
    copy:
      src: /root/storage
      dest: "{{ app_path }}/"
      remote_src: yes 

  - name: Copy .env file
    copy:
      src: "{{ app_path }}/.env.example"
      dest: "{{ app_path }}/.env"
      remote_src: yes

  - name: Configure Laravel environment
    lineinfile:
      path: "{{ app_path }}/.env"
      regexp: "^{{ item.key }}="
      line: "{{ item.key }}={{ item.value }}"
    loop:
      - { key: DB_CONNECTION, value: mysql }
      - { key: DB_HOST, value: 127.0.0.1 }
      - { key: DB_PORT, value: 3306 }
      - { key: DB_DATABASE, value: "{{ db_name }}" }
      - { key: DB_USERNAME, value: "{{ db_user }}" }
      - { key: DB_PASSWORD, value: "{{ db_password }}" }
      - { key: CACHE_DRIVER, value: redis }
      - { key: QUEUE_CONNECTION, value: redis }
      - { key: SESSION_DRIVER, value: redis }

  - name: Install Composer globally
    shell: |
      curl -sS https://getcomposer.org/installer -o composer-setup.php
      php composer-setup.php --install-dir=/usr/local/bin --filename=composer
      rm composer-setup.php
    args:
      executable: /bin/bash
      creates: /usr/local/bin/composer

  - name: Install PHP dependencies
    command: composer install --no-interaction --prefer-dist --optimize-autoloader
    args:
      chdir: "{{ app_path }}"
      creates: "{{ app_path }}/vendor"

  - name: Generate Laravel key
    command: php artisan key:generate
    args:
      chdir: "{{ app_path }}"  

  - name: Install NPM dependencies
    command: npm install
    args:
      chdir: "{{ app_path }}"
      creates: "{{ app_path }}/node_modules"

  - name: Build frontend assets
    command: npm run build
    args:
      chdir: "{{ app_path }}"

  - name: Set correct permissions
    file:
      path: "{{ item }}"
      owner: www-data
      group: www-data
      mode: "775"
      recurse: yes
    loop:
      - "{{ app_path }}/storage"
      - "{{ app_path }}/bootstrap/cache"

  - name: Configure Nginx
    template:
      src: templates/nginx.conf.j2
      dest: /etc/nginx/sites-available/{{ nginx_site_name }}
    notify: Restart nginx

  - name: Enable Nginx site
    file:
      src: /etc/nginx/sites-available/{{ nginx_site_name }}
      dest: /etc/nginx/sites-enabled/{{ nginx_site_name }}
      state: link
    notify: Restart nginx

  - name: Install Certbot
    apt:
      name:
        - certbot
        - python3-certbot-nginx
      state: present

  - name: Obtain SSL certificate
    command: certbot --nginx -d {{ domain }} --non-interactive --agree-tos -m {{ email }}
    args:
      creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem

  - name: Setup SSL auto-renew
    cron:
      name: Certbot Renewal
      job: "certbot renew --quiet"
      minute: "0"
      hour: "2"

  handlers:

  - name: Restart nginx
    service:
      name: nginx
      state: restarted